name: Deploy Orchestrator → Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'agents/orchestrator/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push code to Apps Script
        run: |
          cd agents/orchestrator/backend
          clasp push --force

      - name: Update web app deployment
        env:
          ORCHESTRATOR_EXEC_URL: ${{ secrets.ORCHESTRATOR_EXEC_URL }}
        run: |
          cd agents/orchestrator/backend
          DEPLOYMENT_ID=$(echo "$ORCHESTRATOR_EXEC_URL" | sed 's|.*/macros/s/\([^/]*\)/exec|\1|')
          clasp deploy -i "$DEPLOYMENT_ID" -d "auto $(date '+%Y-%m-%d %H:%M')"
          echo "✅ Deployed to $DEPLOYMENT_ID"

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ORCHESTRATOR_EXEC_URL: ${{ secrets.ORCHESTRATOR_EXEC_URL }}
        run: |
          RESULT=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${ORCHESTRATOR_EXEC_URL}&drop_pending_updates=true")
          echo "$RESULT"
          echo "✅ Webhook registered"
