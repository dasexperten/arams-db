name: Deploy Orchestrator → Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'agents/orchestrator/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push code to Apps Script
        run: |
          cd agents/orchestrator/backend
          clasp push --force

      - name: Update web app deployment
        env:
          ORCHESTRATOR_EXEC_URL: ${{ secrets.ORCHESTRATOR_EXEC_URL }}
        run: |
          cd agents/orchestrator/backend
          DEPLOYMENT_ID=$(echo "$ORCHESTRATOR_EXEC_URL" | sed 's|.*/macros/s/\([^/]*\)/exec|\1|')
          STAMP="auto $(date '+%Y-%m-%d %H:%M:%S')"

          # Step 1: snapshot HEAD as a new immutable version
          VERSION_OUTPUT=$(clasp version "$STAMP")
          echo "clasp version output: $VERSION_OUTPUT"
          VERSION_NUMBER=$(echo "$VERSION_OUTPUT" | grep -oE '[0-9]+' | tail -1)
          if [ -z "$VERSION_NUMBER" ]; then
            echo "::error::Could not parse version number from clasp output"
            exit 1
          fi
          echo "Created version $VERSION_NUMBER"

          # Step 2: rebind the deployment URL to that new version
          clasp deploy -i "$DEPLOYMENT_ID" -V "$VERSION_NUMBER" -d "$STAMP"
          echo "✅ Deployed v$VERSION_NUMBER to $DEPLOYMENT_ID"

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ORCHESTRATOR_EXEC_URL: ${{ secrets.ORCHESTRATOR_EXEC_URL }}
        run: |
          SET_RESULT=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${ORCHESTRATOR_EXEC_URL}&drop_pending_updates=true&allowed_updates=%5B%22message%22%2C%22callback_query%22%5D")
          echo "setWebhook: $SET_RESULT"
          INFO=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")
          echo "getWebhookInfo: $INFO"
          mkdir -p .diag
          {
            echo "set_webhook: $SET_RESULT"
            echo "webhook_info: $INFO"
            echo "configured_url: $ORCHESTRATOR_EXEC_URL"
            echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .diag/webhook-status.txt

      - name: Commit diagnostic file
        run: |
          git config user.name  "deploy-orchestrator-bot"
          git config user.email "deploy@das-experten.local"
          git add .diag/webhook-status.txt
          if git diff --quiet --cached; then
            echo "no diag change"
          else
            git commit -m "diag: webhook status after deploy [skip ci]"
            git push origin HEAD:main || echo "push failed (non-fatal)"
          fi
