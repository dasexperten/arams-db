name: Ozon Auto-Reply

on:
  workflow_dispatch:
    inputs:
      max_replies:
        description: "How many replies to post in this run (default 5). Bump to clear backlog."
        required: false
        default: "5"
  schedule:
    # every 10 minutes, 24/7
    - cron: "*/10 * * * *"

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    concurrency:
      group: ozon-auto-reply
      cancel-in-progress: false
    env:
      OZON_SELLER_CLIENT_ID: ${{ secrets.OZON_SELLER_CLIENT_ID }}
      OZON_SELLER_API_KEY: ${{ secrets.OZON_SELLER_API_KEY }}
      OZON_SELLER_BASE_URL: https://api-seller.ozon.ru
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_REPLIES: ${{ github.event.inputs.max_replies || '5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify secrets present
        run: |
          missing=""
          [ -z "$OZON_SELLER_CLIENT_ID" ] && missing="$missing OZON_SELLER_CLIENT_ID"
          [ -z "$OZON_SELLER_API_KEY" ] && missing="$missing OZON_SELLER_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi

      - name: Run auto-reply
        run: python cli.py auto-reply --max-replies "$MAX_REPLIES"

      - name: Commit replied review IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/replied_reviews.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new replied IDs to commit."
          else
            git commit -m "chore: update replied review IDs [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 2))
            done
          fi
        continue-on-error: true
