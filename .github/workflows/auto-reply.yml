name: Ozon Auto-Reply

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: "Safety stop: abort if more UNPROCESSED reviews than this"
        required: false
        default: "10"
  schedule:
    # 09:00-21:00 Moscow time (UTC+3) = 06:00-18:00 UTC, every hour
    - cron: "0 6-18 * * *"

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    concurrency:
      group: ozon-auto-reply
      cancel-in-progress: false
    env:
      OZON_SELLER_CLIENT_ID: ${{ secrets.OZON_SELLER_CLIENT_ID }}
      OZON_SELLER_API_KEY: ${{ secrets.OZON_SELLER_API_KEY }}
      OZON_SELLER_BASE_URL: https://api-seller.ozon.ru
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_PER_RUN: ${{ github.event.inputs.max_per_run || '10' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify secrets present
        run: |
          missing=""
          [ -z "$OZON_SELLER_CLIENT_ID" ] && missing="$missing OZON_SELLER_CLIENT_ID"
          [ -z "$OZON_SELLER_API_KEY" ] && missing="$missing OZON_SELLER_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi

      - name: Run auto-reply
        run: python cli.py auto-reply --max-per-run "$MAX_PER_RUN"
