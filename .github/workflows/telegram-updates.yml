name: Telegram Pull Updates

# List recent chats with the bot. Use this to discover chat_ids of new
# contacts after they tap /start. Output goes to the run log — read it,
# then trigger Telegram Register Contact with the chat_id you want to keep.

on:
  workflow_dispatch:

jobs:
  updates:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify TELEGRAM_BOT_TOKEN
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN is not set."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install "httpx>=0.27"

      - name: Pull updates
        env:
          PYTHONPATH: my-tools
        run: python -m telegramer updates
