name: telegramer-healthcheck-test-alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test alert
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PY'
          import os, requests, datetime
          msg = (
            "🟡 <b>Test alert (manual)</b>\n\n"
            "Проверка что алерт-канал работает.\n"
            "В настоящем падении сюда придёт 🔴 DOWN с подробностями.\n\n"
            f"Time: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}"
          )
          r = requests.post(
            f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
            json={'chat_id': os.environ['CHAT_ID'], 'parse_mode': 'HTML', 'text': msg},
            timeout=10
          )
          print(r.status_code, r.text[:200])
          PY
