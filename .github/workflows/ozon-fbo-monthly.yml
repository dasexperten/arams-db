name: Ozon FBO Daily Supply Plan

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Sales look-back window in days (default 30)"
        required: false
        default: "30"
  schedule:
    # every day at 08:00 MSK = 05:00 UTC
    - cron: "0 5 * * *"

jobs:
  ozon-fbo-monthly:
    runs-on: ubuntu-latest
    concurrency:
      group: ozon-fbo-monthly
      cancel-in-progress: true
    permissions:
      contents: write
    env:
      OZON_SELLER_CLIENT_ID: ${{ secrets.OZON_SELLER_CLIENT_ID }}
      OZON_SELLER_API_KEY: ${{ secrets.OZON_SELLER_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify secrets present
        run: |
          missing=""
          [ -z "$OZON_SELLER_CLIENT_ID" ] && missing="$missing OZON_SELLER_CLIENT_ID"
          [ -z "$OZON_SELLER_API_KEY"   ] && missing="$missing OZON_SELLER_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi

      - name: Init DB
        run: python cli.py init-ozon-fbo-db

      - name: Run Ozon FBO daily
        run: python cli.py ozon-fbo-monthly

      - name: Debug - probe analytics/data dimensions
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          from datetime import date, timedelta
          from ozon_seller.client import OzonSellerClient

          d_to = date.today().isoformat()
          d_from = (date.today() - timedelta(days=7)).isoformat()
          combos = [
              {"dimension":  ["sku"]},
              {"dimension":  ["day"]},
              {"dimension":  ["spu"]},
              {"dimensions": ["sku"]},
              {"dimensions": ["day"]},
              {"dimension":  ["sku", "day"]},
          ]
          base = {
              "date_from": d_from, "date_to": d_to,
              "metrics": ["ordered_units"], "filters": [], "limit": 1, "offset": 0,
          }
          with OzonSellerClient() as c:
              print("=== stock_on_warehouses sample ===")
              try:
                  r = c.post("/v2/analytics/stock_on_warehouses",
                             {"limit": 1, "offset": 0, "warehouse_type": "fbo"})
                  rows = (r.get("result") or {}).get("rows") or []
                  print(json.dumps(rows[0] if rows else {}, ensure_ascii=False, indent=2))
              except Exception as e:
                  print(f"stock ERR: {e}")

              print("\n=== analytics/data dimension probe ===")
              for combo in combos:
                  body = {**base, **combo}
                  label = json.dumps(combo)
                  try:
                      resp = c.post("/v1/analytics/data", body)
                      rows = (resp.get("result") or {}).get("data") or []
                      print(f"  OK  {label}  rows={len(rows)}")
                      if rows:
                          print(f"      first row: {json.dumps(rows[0], ensure_ascii=False)}")
                  except Exception as e:
                      print(f"  ERR {label}")
                      print(f"      {e}")
          PYEOF
          true

      - name: Show warehouse → cluster mapping (debug)
        if: always()
        run: python cli.py list-ozon-warehouses || true

      - name: Publish artifacts to repo
        if: always()
        run: |
          if [ ! -f docs/ozon-fbo-status.json ]; then
            echo "No artifacts generated — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ozon-fbo-status.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update ozon-fbo artifacts [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
