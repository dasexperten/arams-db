name: Ozon FBO Daily Supply Plan

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Sales look-back window in days (default 30)"
        required: false
        default: "30"
  schedule:
    # every day at 08:00 MSK = 05:00 UTC
    - cron: "0 5 * * *"

jobs:
  ozon-fbo-monthly:
    runs-on: ubuntu-latest
    concurrency:
      group: ozon-fbo-monthly
      cancel-in-progress: true
    permissions:
      contents: write
    env:
      OZON_SELLER_CLIENT_ID: ${{ secrets.OZON_SELLER_CLIENT_ID }}
      OZON_SELLER_API_KEY: ${{ secrets.OZON_SELLER_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify secrets present
        run: |
          missing=""
          [ -z "$OZON_SELLER_CLIENT_ID" ] && missing="$missing OZON_SELLER_CLIENT_ID"
          [ -z "$OZON_SELLER_API_KEY"   ] && missing="$missing OZON_SELLER_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi

      - name: Init DB
        run: python cli.py init-ozon-fbo-db

      - name: Run Ozon FBO daily
        run: python cli.py ozon-fbo-monthly

      - name: Debug storage fees per SKU (Finance API)
        if: always()
        run: python cli.py debug-storage-fees --days 30 || true

      - name: Debug raw API response (field names)
        if: always()
        run: python cli.py debug-ozon-fbo || true

      - name: Show warehouse → cluster mapping (debug)
        if: always()
        run: python cli.py list-ozon-warehouses || true

      - name: Fetch official Ozon cluster list (/v1/cluster/list)
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json
          sys.path.insert(0, '.')
          try:
              from ozon_seller.client import OzonSellerClient
              c = OzonSellerClient()
              resp = c.post("/v1/cluster/list", {})
              clusters = resp.get("clusters") or resp.get("result") or resp
              print(json.dumps(clusters, ensure_ascii=False, indent=2))
          except Exception as e:
              print(f"cluster/list failed: {e}")
          PYEOF
          true

      - name: Debug FBO postings (analytics_data.region)
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json
          from datetime import date, timedelta
          sys.path.insert(0, '.')
          try:
              from ozon_seller.client import OzonSellerClient
              c = OzonSellerClient()
              date_to = date.today().isoformat()
              date_from = (date.today() - timedelta(days=30)).isoformat()
              body = {
                  "dir": "ASC",
                  "filter": {
                      "since": f"{date_from}T00:00:00.000Z",
                      "to":   f"{date_to}T23:59:59.999Z",
                  },
                  "limit": 5,
                  "offset": 0,
                  "with": {"analytics_data": True},
              }
              resp = c.post("/v2/posting/fbo/list", body)
              result = resp.get("result") or []
              if isinstance(result, dict):
                  result = result.get("postings") or []
              print(f"sample count={len(result)}  keys[0]={list(result[0].keys()) if result else 'empty'}")
              for p in result[:3]:
                  ad = p.get("analytics_data") or {}
                  print(json.dumps({
                      "posting_number": p.get("posting_number"),
                      "status": p.get("status"),
                      "analytics_data.region": ad.get("region"),
                      "analytics_data.city": ad.get("city"),
                      "analytics_data.warehouse_name": ad.get("warehouse_name"),
                      "products": [{"sku": x.get("sku"), "qty": x.get("quantity")}
                                   for x in (p.get("products") or [])[:3]],
                  }, ensure_ascii=False, indent=2))
              body_all = {**body, "limit": 1000}
              resp_all = c.post("/v2/posting/fbo/list", body_all)
              result_all = resp_all.get("result") or []
              if isinstance(result_all, dict):
                  result_all = result_all.get("postings") or []
              regions = {}
              missing = 0
              for p in result_all:
                  ad = p.get("analytics_data") or {}
                  r = ad.get("region")
                  if r:
                      regions[r] = regions.get(r, 0) + 1
                  else:
                      missing += 1
              print(f"\nFirst 1000 postings — region breakdown:")
              for r, n in sorted(regions.items(), key=lambda x: -x[1])[:30]:
                  print(f"  {n:>4}  {r}")
              print(f"  (missing region: {missing})")
          except Exception as e:
              print(f"posting/fbo/list failed: {type(e).__name__}: {e}")
          PYEOF
          true

      - name: Debug — dump ALL OperationMarketplaceServiceStorage ops in full
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json, sqlite3
          from datetime import date, timedelta
          from collections import defaultdict
          sys.path.insert(0, '.')
          try:
              from ozon_seller.client import OzonSellerClient

              conn = sqlite3.connect('ozon_fbo.db')
              de208_numeric = [
                  str(r[0]) for r in conn.execute(
                      "SELECT DISTINCT sku FROM ozon_fbo_stocks WHERE offer_id LIKE 'DE208%' AND offer_id IS NOT NULL"
                  )
              ]
              print(f"DE208* numeric SKU IDs from stocks DB: {de208_numeric}")
              # Build full numeric → offer_id map for SKU annotation
              sku_to_offer = {
                  str(r[0]): str(r[1]) for r in conn.execute(
                      "SELECT DISTINCT sku, offer_id FROM ozon_fbo_stocks WHERE offer_id IS NOT NULL"
                  )
              }
              conn.close()

              c = OzonSellerClient()
              date_to = date.today().isoformat()
              date_from = (date.today() - timedelta(days=30)).isoformat()
              storage_ops = []
              page = 1
              while True:
                  resp = c.post("/v3/finance/transaction/list", {
                      "filter": {
                          "date": {"from": f"{date_from}T00:00:00.000Z", "to": f"{date_to}T23:59:59.999Z"},
                          "transaction_type": "services",
                      },
                      "page": page, "page_size": 1000,
                  })
                  result = resp.get("result") or {}
                  ops = result.get("operations") or []
                  page_count = int(result.get("page_count") or 1)
                  for op in ops:
                      if op.get("operation_type") == "OperationMarketplaceServiceStorage":
                          storage_ops.append(op)
                  if page >= page_count or not ops:
                      break
                  page += 1

              print(f"\nTotal OperationMarketplaceServiceStorage ops in 30 days: {len(storage_ops)}")
              total_amount = sum(abs(float(op.get("amount") or 0)) for op in storage_ops)
              print(f"Total amount: {total_amount:.2f} руб")
              print(f"\n=== Full dump of ALL OperationMarketplaceServiceStorage ops ===")
              by_offer = defaultdict(float)
              for op in storage_ops:
                  amt = abs(float(op.get("amount") or 0))
                  items = op.get("items") or []
                  posting = op.get("posting") or {}
                  print(f"\nop_id={op.get('operation_id')}  date={op.get('operation_date')}  "
                        f"amount={amt:.2f}  items_count={len(items)}  posting_number={posting.get('posting_number','')}  "
                        f"warehouse_id={posting.get('warehouse_id', '')}")
                  if not items:
                      print("    items[] EMPTY")
                  for it in items:
                      s = str(it.get("sku"))
                      offer = sku_to_offer.get(s, "(not in stocks DB)")
                      mark = " ⭐DE208" if s in de208_numeric else ""
                      print(f"    sku={s} offer_id={offer}{mark}  name={it.get('name','')[:50]}")
                      # Attribute to offer (assuming whole amount per item is wrong but try)
                      if offer != "(not in stocks DB)":
                          # Equal split for comparison
                          by_offer[offer] += amt / len(items) if items else 0
              print(f"\n=== Top 20 offer_ids by equal-split attribution ===")
              for offer, total in sorted(by_offer.items(), key=lambda x: -x[1])[:20]:
                  print(f"  {total:10.2f} руб  {offer}")
              if "DE208AA" in by_offer:
                  print(f"\n  DE208AA share: {by_offer['DE208AA']:.2f} руб (sum-divided)")
              else:
                  print(f"\n  DE208AA NOT FOUND in any items[] of OperationMarketplaceServiceStorage ops!")
          except Exception as e:
              import traceback
              print(f"debug failed: {e}")
              traceback.print_exc()
          PYEOF
          true

      - name: Debug finance — scan services[] for storage charges
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json
          from datetime import date, timedelta
          from collections import defaultdict
          sys.path.insert(0, '.')
          try:
              from ozon_seller.client import OzonSellerClient
              c = OzonSellerClient()
              date_to = date.today().isoformat()
              date_from = (date.today() - timedelta(days=30)).isoformat()
              print(f"Scanning ALL finance transactions: {date_from} to {date_to}")
              service_totals = defaultdict(float)
              op_type_amounts = defaultdict(float)
              storage_sample_ops = []
              page = 1
              total = 0
              while True:
                  body = {
                      "filter": {
                          "date": {
                              "from": f"{date_from}T00:00:00.000Z",
                              "to":   f"{date_to}T23:59:59.999Z",
                          },
                          "transaction_type": "all",
                      },
                      "page": page,
                      "page_size": 1000,
                  }
                  resp = c.post("/v3/finance/transaction/list", body)
                  result = resp.get("result") or {}
                  ops = result.get("operations") or []
                  page_count = int(result.get("page_count") or 1)
                  for op in ops:
                      ot = op.get("operation_type") or "(none)"
                      op_type_amounts[ot] += abs(float(op.get("amount") or 0))
                      # Sample top-level OperationMarketplaceServiceStorage ops
                      if ot == "OperationMarketplaceServiceStorage" and len(storage_sample_ops) < 5:
                          storage_sample_ops.append(op)
                      for svc in (op.get("services") or []):
                          name = svc.get("name") or "(none)"
                          price = abs(float(svc.get("price") or 0))
                          service_totals[name] += price
                  total += len(ops)
                  if page >= page_count or not ops:
                      break
                  page += 1
              print(f"\nTotal operations scanned: {total} across {page} pages")
              print(f"\n=== Top 20 operation_type values by amount ===")
              for t, amt in sorted(op_type_amounts.items(), key=lambda x: -x[1])[:20]:
                  print(f"  {amt:12.2f} руб  {t}")
              print(f"\n=== ALL service names found in services[] (sorted by total) ===")
              for n, amt in sorted(service_totals.items(), key=lambda x: -x[1]):
                  print(f"  {amt:12.2f} руб  {n}")
              print(f"\n=== Storage-related ops (first 3 with services[]) ===")
              for op in storage_sample_ops[:3]:
                  print(json.dumps(op, ensure_ascii=False, indent=2))
          except Exception as e:
              import traceback
              print(f"finance/transaction/list failed: {e}")
              traceback.print_exc()
          PYEOF
          true

      - name: Probe analytics dimensions (delivery_region check)
        if: always()
        run: |
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, '.')
          try:
              from ozon_fbo.api import OzonFBOAPI
              with OzonFBOAPI() as api:
                  print("=== probe_analytics ===")
                  api.probe_analytics()
          except Exception as e:
              print(f"probe_analytics failed: {e}")
          PYEOF
          true

      - name: Dump all delivery_region values + cluster mapping
        if: always()
        run: |
          python - <<'PYEOF'
          import sys, json
          from datetime import date, timedelta
          from collections import defaultdict
          sys.path.insert(0, '.')
          try:
              from ozon_seller.client import OzonSellerClient
              from ozon_fbo.clusters import warehouse_to_cluster
              c = OzonSellerClient()
              d_to = date.today().isoformat()
              d_from = (date.today() - timedelta(days=30)).isoformat()
              region_totals = defaultdict(int)
              offset = 0
              while True:
                  resp = c.post("/v1/analytics/data", {
                      "date_from": d_from, "date_to": d_to,
                      "metrics": ["ordered_units"],
                      "dimension": ["delivery_region"],
                      "filters": [], "limit": 1000, "offset": offset,
                  })
                  rows = (resp.get("result") or {}).get("data") or []
                  for row in rows:
                      dims = row.get("dimensions") or []
                      mets = row.get("metrics") or []
                      region = dims[0].get("name", "") if dims else ""
                      units = int(float(mets[0])) if mets else 0
                      region_totals[region] += units
                  if len(rows) < 1000:
                      break
                  offset += len(rows)
              print(f"\nВсего регионов из API: {len(region_totals)}")
              unknown = {r: v for r, v in region_totals.items() if warehouse_to_cluster(r) == 'UNKNOWN'}
              mapped = {r: v for r, v in region_totals.items() if warehouse_to_cluster(r) != 'UNKNOWN'}
              print(f"Замаплено: {len(mapped)}, UNKNOWN: {len(unknown)}")
              print(f"\n=== UNKNOWN регионы (сортировка по продажам) ===")
              for r, v in sorted(unknown.items(), key=lambda x: -x[1]):
                  print(f"  {v:>6}  {r!r}")
              print(f"\n=== Замаплено ===")
              for r, v in sorted(mapped.items(), key=lambda x: -x[1])[:40]:
                  print(f"  {v:>6}  {r!r:40} → {warehouse_to_cluster(r)}")
          except Exception as e:
              print(f"delivery_region dump failed: {type(e).__name__}: {e}")
          PYEOF
          true

      - name: Publish artifacts to repo
        if: always()
        run: |
          if [ ! -f docs/ozon-fbo-status.json ]; then
            echo "No artifacts generated -- skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ozon-fbo-status.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update ozon-fbo artifacts [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
