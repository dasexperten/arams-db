name: Telegram Register Contact

# Add a contact to telegramer/contacts.json and commit.
# Use this after a contact taps /start in the bot — get their chat_id from
# `Telegram Pull Updates` workflow, then run this with name + chat_id.

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Short canonical name (e.g. 'Ivan_Petrov', 'Vendor_X'). Used by agents to address them."
        required: true
      chat_id:
        description: "Numeric chat_id from getUpdates"
        required: true

jobs:
  register:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TG_NAME: ${{ github.event.inputs.name }}
      TG_CHAT_ID: ${{ github.event.inputs.chat_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update contacts.json
        env:
          PYTHONPATH: my-tools
        run: python -m telegramer register --name "$TG_NAME" --chat-id "$TG_CHAT_ID"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-tools/telegramer/contacts.json
          if git diff --cached --quiet; then
            echo "No change — contact already registered with same chat_id."
            exit 0
          fi
          git commit -m "chore(telegramer): register $TG_NAME"
          for i in 1 2 3 4; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          echo "::error::push failed after retries"
          exit 1
