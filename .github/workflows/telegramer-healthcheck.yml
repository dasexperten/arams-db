name: telegramer-healthcheck

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe
        id: probe
        run: |
          RESP=$(curl -s --max-time 20 \
            -H "Authorization: Bearer ${{ secrets.TELEGRAMER_BRIDGE_SECRET }}" \
            https://telegramer-bridge.dasexperten.workers.dev/health || echo '{}')
          
          WORKER=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('worker','MISSING'))" 2>/dev/null || echo "PARSE_FAIL")
          VPS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('vps_telethon','MISSING'))" 2>/dev/null || echo "PARSE_FAIL")
          SESSION=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('telethon_session_active',False))" 2>/dev/null || echo "PARSE_FAIL")
          
          echo "worker=$WORKER" >> $GITHUB_OUTPUT
          echo "vps=$VPS" >> $GITHUB_OUTPUT
          echo "session=$SESSION" >> $GITHUB_OUTPUT
          
          if [ "$WORKER" = "ok" ] && [ "$VPS" = "ok" ] && [ "$SESSION" = "True" ]; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✓ All systems operational"
          else
            echo "status=BROKEN" >> $GITHUB_OUTPUT
            echo "✗ Worker=$WORKER VPS=$VPS Session=$SESSION"
          fi

      - name: Alert on failure
        if: steps.probe.outputs.status == 'BROKEN'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKER: ${{ steps.probe.outputs.worker }}
          VPS: ${{ steps.probe.outputs.vps }}
          SESSION: ${{ steps.probe.outputs.session }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PY'
          import os, requests, datetime
          msg = (
            f"🔴 <b>telegramer-vps DOWN</b>\n\n"
            f"Worker: <code>{os.environ['WORKER']}</code>\n"
            f"VPS Telethon: <code>{os.environ['VPS']}</code>\n"
            f"Session active: <code>{os.environ['SESSION']}</code>\n\n"
            f"Time: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}\n"
            f"Logs: https://github.com/dasexperten/arams-db/actions/runs/{os.environ['RUN_ID']}"
          )
          r = requests.post(
            f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
            json={'chat_id': os.environ['CHAT_ID'], 'parse_mode': 'HTML', 'text': msg},
            timeout=10
          )
          print(r.status_code, r.text[:200])
          PY
          exit 1
