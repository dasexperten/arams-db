name: telegramer-healthcheck

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Worker /health
        id: probe
        run: |
          RESP=$(curl -s --max-time 20 \
            -H "Authorization: Bearer ${{ secrets.TELEGRAMER_BRIDGE_SECRET }}" \
            https://telegramer-bridge.dasexperten.workers.dev/health || echo '{}')
          echo "raw=$RESP" >> $GITHUB_OUTPUT
          
          WORKER=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('worker','MISSING'))" 2>/dev/null || echo "PARSE_FAIL")
          VPS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('vps_telethon','MISSING'))" 2>/dev/null || echo "PARSE_FAIL")
          SESSION=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('telethon_session_active',False))" 2>/dev/null || echo "PARSE_FAIL")
          USERBOT=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('userbot_username','MISSING'))" 2>/dev/null || echo "PARSE_FAIL")
          
          echo "worker=$WORKER" >> $GITHUB_OUTPUT
          echo "vps=$VPS" >> $GITHUB_OUTPUT
          echo "session=$SESSION" >> $GITHUB_OUTPUT
          echo "userbot=$USERBOT" >> $GITHUB_OUTPUT
          
          if [ "$WORKER" = "ok" ] && [ "$VPS" = "ok" ] && [ "$SESSION" = "True" ]; then
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "status=BROKEN" >> $GITHUB_OUTPUT
          fi

      - name: Alert on failure
        if: steps.probe.outputs.status == 'BROKEN'
        run: |
          MSG="🔴 <b>telegramer-vps DOWN</b>
          
          Worker: <code>${{ steps.probe.outputs.worker }}</code>
          VPS Telethon: <code>${{ steps.probe.outputs.vps }}</code>
          Session active: <code>${{ steps.probe.outputs.session }}</code>
          Userbot: <code>${{ steps.probe.outputs.userbot }}</code>
          
          Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Check: https://github.com/dasexperten/arams-db/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=HTML \
            -d text="$MSG"
          exit 1
