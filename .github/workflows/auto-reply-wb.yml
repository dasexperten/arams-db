name: Wildberries Auto-Reply

on:
  workflow_dispatch:
    inputs:
      max_replies:
        description: "How many replies to post in this run (default 3). Bump to clear backlog."
        required: false
        default: "3"
  schedule:
    # every 10 minutes, 24/7 — up to 3 replies per run × 6 runs/hour = 18/hour cap
    - cron: "*/10 * * * *"

jobs:
  auto-reply-wb:
    runs-on: ubuntu-latest
    concurrency:
      group: wb-auto-reply
      cancel-in-progress: false
    env:
      WB_FEEDBACKS_TOKEN: ${{ secrets.WB_FEEDBACKS_TOKEN }}
      WB_FEEDBACKS_BASE_URL: https://feedbacks-api.wildberries.ru
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MAX_REPLIES: ${{ github.event.inputs.max_replies || '3' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify secrets present
        run: |
          missing=""
          [ -z "$WB_FEEDBACKS_TOKEN" ] && missing="$missing WB_FEEDBACKS_TOKEN"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            exit 1
          fi

      - name: Run WB auto-reply
        run: python cli.py auto-reply-wb --max-replies "$MAX_REPLIES"
